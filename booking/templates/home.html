<!DOCTYPE html>
<html>
<head>
  <title>Ticket Booking</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2 class="text-center mb-4">🎟️ Ticket Booking</h2>
<h5 class="text-center mb-3">
  Total Tickets Booked: {{ total }}
</h5>

<!-- ✅ PUT IT HERE -->
{% if success %}
<div class="alert alert-success text-center">
  ✅ Ticket Booked Successfully!
</div>
{% endif %}

<form method="POST" class="card p-4 shadow">
  {% csrf_token %}

  <input type="text" name="name" class="form-control mb-3" placeholder="Enter Name" required="">

  <input type="text" name="phone" class="form-control mb-3" placeholder="Phone Number" required="">

  <select name="event" class="form-control mb-3">
    <option>Drama</option>
    <option>Skit</option>
    <option>Dance</option>
  </select>

  <input type="number" name="tickets" class="form-control mb-3" placeholder="Number of Tickets" required>

  <button class="btn btn-primary w-100">Book Ticket</button>
</form>

</body>
</html>
